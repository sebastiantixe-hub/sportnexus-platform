services:
  # ─── Backend (NestJS API) ────────────────────────────────────────
  - type: web
    name: sportnexus-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install --include=dev && npx prisma generate && npm run build
    startCommand: npx prisma db push && node dist/main
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: PAYME_ACQUIRER_ID
        sync: false
      - key: PAYME_COMMERCE_ID
        sync: false
      - key: PAYME_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: AUTH0_DOMAIN
        value: dev-6d0mok1v1ohx5iez.us.auth0.com
      - key: AUTH0_AUDIENCE
        value: https://sportnexus-api

  # ─── Frontend (React/Vite) — Static Site (100% gratis, sin sleep) ─
  - type: web
    name: sportnexus-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
